spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kimp_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  influxdb:
    url: http://localhost:8086
    token: -DiLAAyIFnj9bvpxdNj8fylK8mYyBNFZRi3gHSEPsGjei40Z7ukPW5MNSiUWkFWEN7yQ2SajJEPB2GigsGvOoA==
    org: kimp-org
    bucket: kimp-bucket

kimp:
  leverage: 5
  notification-threshold: 5.0  # 연환산 수익률(APR)이 5% 이상일 때 알림
  telegram:
    bot-token: ${BotToken}
    chat-id: ${ChatID}

encryption:
  secret-key: "your-super-secret-key-32-chars-!" # 32 bytes for AES-256
  iv: "your-iv-16-chars" # 16 bytes for IV

jwt:
  token:
    secret-key: "vmfhaltm-server-secret-key-very-long-and-secure-base64-encoded"
    access-expire-length: 3600000 # 1 hour
    refresh-expire-length: 1209600000 # 14 days