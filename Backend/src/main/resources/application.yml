spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kimp_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  influxdb:
    url: http://localhost:8086
    token: my-super-secret-auth-token
    org: my-org
    bucket: kimp-bucket

kimp:
  coins:
    - btc
    - eth
    - sol
    - xrp
    - doge