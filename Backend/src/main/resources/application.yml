spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kimp_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  influxdb:
    url: http://localhost:8086
    token: -DiLAAyIFnj9bvpxdNj8fylK8mYyBNFZRi3gHSEPsGjei40Z7ukPW5MNSiUWkFWEN7yQ2SajJEPB2GigsGvOoA==
    org: kimp-org
    bucket: kimp-bucket

kimp:
  leverage: 5
  notification-threshold: 5.0  # 연환산 수익률(APR)이 5% 이상일 때 알림
  telegram:
    bot-token: ${BotToken}
    chat-id: ${ChatID}
  coins:
