spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kimp_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  influxdb:
    url: http://localhost:8086
    token: ${INFLUXDB_TOKEN}
    org: kimp-org
    bucket: kimp-bucket

server:
  forward-headers-strategy: framework

app:
  security:
    require-ssl: false
    secure-cookies: false
    allowed-origins: ${APP_SECURITY_ALLOWED_ORIGINS:https://localhost,http://localhost,http://localhost:3000,http://localhost:5173}

kimp:
  telegram:
    bot-token: ${BotToken}
    chat-id: ${ChatID}

encryption:
  secret-key: ${ENCRYPTION_KEY}
  iv: ${ENCRYPTION_IV}

jwt:
  token:
    secret-key: ${JWT_SECRET_KEY}
    access-expire-length: 3600000 # 1 hour
    refresh-expire-length: 1209600000 # 14 days

logging:
  level:
    org.springframework.web.socket.config.WebSocketMessageBrokerStats: warn
