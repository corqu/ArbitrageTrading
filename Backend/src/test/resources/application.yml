spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  influxdb:
    url: http://localhost:8086
    token: test-token
    org: test-org
    bucket: test-bucket

kimp:
  coins:
    - btc
    - eth
    - sol
    - xrp
    - doge
